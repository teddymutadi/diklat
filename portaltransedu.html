<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: #f4f7f6; overflow: hidden; }
    
    /* Navigasi Kiri */
    .sidebar { width: 250px; background: green; color: white; display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-header { padding: 20px; text-align: center; background: #1a252f; font-weight: bold; }
    .nav-item { padding: 15px 20px; cursor: pointer; display: flex; align-items: center; transition: 0.3s; color: white; }
    .nav-item:hover { background: #34495e; color: white; }
    .nav-item.active { background: #3498db; color: white; border-left: 5px solid #fff; }
    .nav-item i { margin-right: 15px; width: 20px; text-align: center; }

    /* Area Kanan */
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .header { background: white; padding: 15px 25px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-weight: bold; }
    .container { flex: 1; position: relative; background: #fff; }

    /* Frame Aturan */
    iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; display: none; }
    iframe.active { display: block; }

    /* Dashboard */
    #dashboard-view { padding: 30px; position: absolute; width: 100%; height: 100%; box-sizing: border-box; overflow-y: auto; display: none; }
    #dashboard-view.active { display: block; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
    .card { background: white; padding: 25px; border-radius: 10px; text-align: center; cursor: pointer; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s; border-top: 5px solid #e67e22; }
    .card:hover { transform: translateY(-5px); background: #fff9f4; }
    .card i { font-size: 2.5em; color: #e67e22; margin-bottom: 10px; }
  </style>
</head>
<body>

  <!-- SIDEBAR KIRI (Untuk Input/Aplikasi) -->
  <div class="sidebar"> 
    <br>
      <center>
    <img src="https://teddymutadi.github.io/myportfolio/kemenag.png" width="100" height="90">
    </center>
    <br>
    
    <div class="sidebar-header">TRANS EDUCATION 2026</div>
    <div class="nav-item active" onclick="buka('dashboard')"><i class="fas fa-home"></i> Dashboard</div>
    <div class="nav-item" onclick="buka('app-absen')"><i class="fas fa-user-check"></i>Data Peserta</div>
    <div class="nav-item" onclick="buka('app-rpp')"><i class="fas fa-edit"></i> Rencana Pembelajaran</div>
    <div class="nav-item" onclick="buka('app-digital')"><i class="fas fa-file-upload"></i>Pemanfaatan Digital</div>
    <div class="nav-item" onclick="buka('app-soal')"><i class="fas fa-database"></i>Penilaian</div>
  </div>

  <div class="main-content">
    <div class="header" id="judul-halaman"><h1>Dashboard Monitoring Pembelajaran Bermutu 2026</h1></div>
    
    <div class="container">
      <!-- HALAMAN DASHBOARD (Berisi Tombol ke GSheet/Output) -->
      <div id="dashboard-view" class="active">
        <h2>Hasil Data</h2>
        <div class="grid">
          <div class="card" onclick="buka('sheet-absen')">
            <i class="fas fa-table"></i>
            <h3>Data Absensi</h3>
          </div>
          <div class="card" onclick="buka('sheet-rpp')">
            <i class="fas fa-table"></i>
            <h3>Data RPP</h3>
          </div>
          <div class="card" onclick="buka('sheet-digital')">
            <i class="fas fa-table"></i>
            <h3>Data Digital</h3>
          </div>
          <div class="card" onclick="buka('sheet-soal')">
            <i class="fas fa-table"></i>
            <h3>Data Penilaian</h3>
          </div>
        </div>
      </div>

      <!-- IFRAME APLIKASI (INPUT) -->
      <iframe id="page-app-absen" src="https://script.google.com/macros/s/AKfycbzwSufsShreFguMlNGAaKb5LIa7WpIpAPMWMIGLIO2bFtmSzWVbGFIoZdd7ZCvp6PGZ/exec"></iframe>
      <iframe id="page-app-rpp" src="https://script.google.com/macros/s/AKfycbxCgvtTC1QoanYHYyI2cabZFCwK5RrCU3QJV_ZCRq9AQPZD3ORN39EAaCVJlBlH38lQPg/exec"></iframe>
      <iframe id="page-app-digital"   src="https://script.google.com/macros/s/AKfycbzwu74XKBLZCdnvf3047RldeD7M78FhhPaw9rP5olyCFV_l0asabEKSFf90uitCtQev/exec"></iframe>
      <iframe id="page-app-soal"  src="https://script.google.com/macros/s/AKfycbw62qXZVL9-GDSQHGmsmfgtqeH0sYo3qHBMqIS7nbIAjlQyL6eneR2M0U2CnBvYWznEog/exec"></iframe>

      <!-- IFRAME GSHEET (OUTPUT) -->
      <!-- Tips: Gunakan link Gsheet yang sudah di-Share "Anyone can view" -->
      <iframe id="page-sheet-absen" src="https://docs.google.com/spreadsheets/d/1VU_PGPhLNHwGunSsqFz91zYxixtwltfdayJwQycNNzc/edit?usp=sharing?usp=sharing?gid=0#gid=0"></iframe>
      <iframe id="page-sheet-rpp" src="https://docs.google.com/spreadsheets/d/1nYJkFMuADVZWwjT8ghRSP32iTLJbvs3_ulRw4fHIMe4/edit?usp=sharing/edit?gid=0#gid=0"></iframe>
      <iframe id="page-sheet-digital" src="https://docs.google.com/spreadsheets/d/1UABQyO7QHoE8QuEqh8fMOhORJyjHKpeybKGZOJVFD8g/edit?usp=sharing?gid=0#gid=0"></iframe>
      <iframe id="page-sheet-soal"  src="https://docs.google.com/spreadsheets/d/1WxDRXsPnv3mTSS0c741u8v16EaxrlJ79aA_m4XGuTNY/edit?usp=sharing?gid=0#gid=0"></iframe>

    </div>
  </div>

  <script>
    function buka(id) {
      // 1. Sembunyikan semuanya dulu
      document.getElementById('dashboard-view').classList.remove('active');
      document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

      // 2. Tampilkan yang diklik
      if(id === 'dashboard') {
        document.getElementById('dashboard-view').classList.add('active');
        document.querySelector('.nav-item:nth-child(2)').classList.add('active');
        document.getElementById('judul-halaman').innerText = "Dashboard Monitoring";
      } else {
        document.getElementById('page-' + id).classList.add('active');
        document.getElementById('judul-halaman').innerText = id.replace(/-/g, ' ').toUpperCase();
      }
    }
  </script>
</body>
</html>
